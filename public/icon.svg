<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf6f9"/>
      <stop offset="100%" stop-color="#f8e4ee"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0a0b8"/>
      <stop offset="100%" stop-color="#d4829e"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c8d8"/>
      <stop offset="100%" stop-color="#d4829e"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Checkmark circle -->
  <circle cx="256" cy="232" r="120" fill="url(#accent)" opacity="0.15"/>
  <circle cx="256" cy="232" r="100" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>

  <!-- Checkmark -->
  <polyline points="210,232 244,268 306,200" fill="none" stroke="#d4829e" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Star / reward sparkle - top right -->
  <polygon points="370,100 380,130 410,130 386,150 394,180 370,162 346,180 354,150 330,130 360,130" fill="url(#star)" opacity="0.9"/>

  <!-- Small sparkle - top left -->
  <polygon points="148,120 153,135 168,135 156,145 160,160 148,152 136,160 140,145 128,135 143,135" fill="#f0c8d8" opacity="0.7"/>

  <!-- Progress bar at bottom -->
  <rect x="116" y="370" width="280" height="16" rx="8" fill="#d4829e" opacity="0.18"/>
  <rect x="116" y="370" width="190" height="16" rx="8" fill="url(#accent)"/>

  <!-- Milestone dots on progress bar -->
  <circle cx="186" cy="378" r="6" fill="#fff" opacity="0.9"/>
  <circle cx="246" cy="378" r="6" fill="#fff" opacity="0.9"/>
  <circle cx="306" cy="378" r="6" fill="#fff" opacity="0.5"/>
  <circle cx="366" cy="378" r="6" fill="#fff" opacity="0.3"/>

  <!-- Small text hint -->
  <text x="256" y="420" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="600" fill="#d4829e" letter-spacing="6" opacity="0.6">GOALS</text>
</svg>
