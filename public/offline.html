<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milestone - Offline</title>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fdf6f9; font-family: 'Nunito Sans', sans-serif; color: #8a7080; }
    .box { text-align: center; padding: 32px; }
    .icon { margin-bottom: 16px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 400; font-size: 28px; color: #6a5060; margin: 0 0 8px; }
    p { font-size: 13px; letter-spacing: 1px; margin: 0; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">
      <svg width="48" height="48" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="28" fill="#d4829e" opacity="0.13"/>
        <circle cx="32" cy="32" r="22" stroke="#d4829e" stroke-width="2.5" fill="none"/>
        <polyline points="22,33 29,40 42,26" fill="none" stroke="#d4829e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Check your connection and try again.</p>
  </div>
</body>
</html>
